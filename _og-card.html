<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #fafaf7;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 90px;
    position: relative;
  }

  /* Accent bar left */
  .card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    width: 6px;
    height: 100%;
    background: linear-gradient(180deg, #4338ca 0%, #6366f1 100%);
  }

  /* Subtle grid background */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(67,56,202,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(67,56,202,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .content {
    position: relative;
    z-index: 1;
  }

  .eyebrow {
    font-family: ui-monospace, 'Cascadia Code', 'SF Mono', monospace;
    font-size: 18px;
    color: #4338ca;
    letter-spacing: 0.05em;
    margin-bottom: 20px;
    font-weight: 500;
  }

  h1 {
    font-size: 80px;
    font-weight: 800;
    color: #1c1917;
    letter-spacing: -0.04em;
    line-height: 1;
    margin-bottom: 16px;
  }

  .role {
    font-family: ui-monospace, 'Cascadia Code', 'SF Mono', monospace;
    font-size: 26px;
    color: #4338ca;
    letter-spacing: -0.01em;
    margin-bottom: 28px;
  }

  .tagline {
    font-size: 20px;
    color: #78716c;
    line-height: 1.6;
    max-width: 760px;
  }

  .bottom {
    position: absolute;
    bottom: 52px;
    right: 90px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 1;
  }

  .pills {
    display: flex;
    gap: 8px;
  }

  .pill {
    font-family: ui-monospace, monospace;
    font-size: 14px;
    background: rgba(67,56,202,0.07);
    border: 1px solid rgba(67,56,202,0.18);
    color: #4338ca;
    padding: 5px 13px;
    border-radius: 6px;
  }

  .url {
    font-family: ui-monospace, monospace;
    font-size: 16px;
    color: #a8a29e;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <div class="eyebrow">// disponible · Île-de-France</div>
    <h1>Dorian Maillard</h1>
    <div class="role">Backend Engineer — Java / Spring</div>
    <div class="tagline">APIs robustes · migrations maîtrisées · qualité logicielle</div>
  </div>
  <div class="bottom">
    <div class="pills">
      <span class="pill">Java 21</span>
      <span class="pill">Spring Boot</span>
      <span class="pill">GraphQL</span>
    </div>
    <span class="url">dodoma95.github.io/cv</span>
  </div>
</div>
</body>
</html>
